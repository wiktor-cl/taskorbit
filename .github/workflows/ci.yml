name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test -race (Testcontainers needs Docker, already available on this runner)
        run: go test -race ./...

      - name: golangci-lint
        # golangci-lint-action@v6 with version:latest currently resolves to
        # a v1.x release built with an older Go toolchain than this
        # module's go.mod targets, which v1 refuses to lint. Running the v2
        # module directly (same command verified locally) sidesteps that.
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest run ./...

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose config
        working-directory: infra
        run: docker compose config -q
